services: 
  mlflow:
    env_file:
      - .env
    image: python:3.12-slim
    container_name: ${DOCKER_MLFLOW_NAME}
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI_DOCKER}  
    volumes:
      - ./mlruns:/mlruns      
    command: 
      - "bash"
      - "-c"
      - "pip install --no-cache-dir mlflow -q && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlruns/mlflow.db --default-artifact-root /mlruns/artifacts --allowed-hosts '*'"
    ports:
      - '5000:5000'
    networks:
      - ${APP_NETWORK_NAME}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  fastapi:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PORT_LOCAL=${PORT_LOCAL}
        - PORT_REMOTE=${PORT_REMOTE}
    image: ${IMAGE_NAME}:${IMAGE_VERSION}
    container_name: ${DOCKER_FASTAPI_NAME}
    restart: always
    environment:
      - PIPELINE_VERSION=${PIPELINE_VERSION}
      - PORT_LOCAL=${PORT_LOCAL}
      - PORT_REMOTE=${PORT_REMOTE}
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    ports:
      - '${PORT_LOCAL}:${PORT_REMOTE}'    
    volumes:
      - .:/app 
      - /app/__pycache__
      - /app/.pytest_cache
    networks:
      - ${APP_NETWORK_NAME}
    depends_on:
      mlflow:
        condition: service_healthy

networks:
  renovacion_prestamo-net:
    name: ${APP_NETWORK_NAME}
    driver: bridge