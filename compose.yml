services: 
  fastapi:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PORT_LOCAL=${PORT_LOCAL}
        - PORT_REMOTE=${PORT_REMOTE}
    image: ${IMAGE_NAME}:${IMAGE_VERSION}
    container_name: ${DOCKER_FASTAPI_NAME}
    restart: always
    environment:
      - PIPELINE_VERSION=v1.0.0
      - PORT_LOCAL=${PORT_LOCAL}
      - PORT_REMOTE=${PORT_REMOTE}
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    ports:
      - '${PORT_LOCAL}:${PORT_REMOTE}'    
    volumes:
      - .:/app 
      - /app/__pycache__
      - /app/.pytest_cache
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    networks:
      - ${APP_NETWORK_NAME}
    depends_on:
      mlflow:
        condition: service_healthy

  mlflow:
    env_file:
      - .env
    image: python:3.12-slim
    container_name: ${DOCKER_MLFLOW_NAME}
    environment:
      - GUNICORN_CMD_ARGS=--forwarded-allow-ips=* --allow-code-sharing
    command: bash -c "pip install mlflow -q && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlruns/mlflow.db --default-artifact-root file:///mlruns/artifacts --allowed-hosts '*'"
    ports:
      - '5000:5000'
    volumes:
      - ./mlruns:/mlruns
    networks:
      - ${APP_NETWORK_NAME}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5000'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 60s

networks:
  renovacion_prestamo-net:
    name: ${APP_NETWORK_NAME}
    driver: bridge